<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1f2937;
      background: #f9fafb;
      padding: 12px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .sub {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 12px;
    }
    .domain-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
      max-height: 300px;
      overflow-y: auto;
    }
    .domain-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 6px 10px;
    }
    .domain-row .name {
      flex: 1;
      font-size: 13px;
    }
    .domain-row .remove {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      line-height: 1;
    }
    .domain-row .remove:hover { color: #dc2626; }
    .add-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .add-row input {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
    }
    .add-row input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
    .add-row button, .status-btn {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .add-row button:hover, .status-btn:hover { background: #2563eb; }
    .actions {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .actions button {
      flex: 1;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 7px;
      font-size: 12px;
      cursor: pointer;
    }
    .actions button:hover { background: #f3f4f6; }
    .status-bar {
      font-size: 11px;
      color: #6b7280;
      text-align: center;
      padding: 4px 0;
    }
    .status-bar.ok { color: #059669; }
    .status-bar.err { color: #dc2626; }
  </style>
</head>
<body>
  <h1>🍪 Cookinc Bridge</h1>
  <div class="sub">Domaine autorisés à sync</div>

  <div id="currentDomain" style="display:none; background:#e0f2fe; border:1px solid #7dd3fc; border-radius:6px; padding:6px 10px; margin-bottom:10px; font-size:13px; align-items:center; justify-content:space-between;">
    <span id="currentDomainName" style="flex:1"></span>
    <button id="toggleDomainBtn" style="border:none; border-radius:4px; padding:4px 10px; font-size:12px; cursor:pointer; display:none;"></button>
  </div>

  <div class="domain-list" id="domainList"></div>

  <div class="add-row">
    <input type="text" id="newDomain" placeholder="ex: example.com" />
    <button id="addBtn">Ajouter</button>
  </div>

  <div class="actions">
    <button id="syncNow">Sync now</button>
    <button id="refreshBtn">↻</button>
  </div>

  <div class="status-bar" id="statusBar">Chargement...</div>

  <script src="popup.js"></script>
</body>
</html>
